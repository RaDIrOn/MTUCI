<!DOCTYPE html>
<html>
<head>
    <title>Архив всех статей</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/article.css' %}">
</head>
    <body class="archive">
        <div class="header">
            {% if user.is_authenticated %}
                <span class="user-info">{{ user.username }}</span>
                <a href="/logout/" class="auth-btn">Выйти</a>
            {% else %}
                <a href="/login/" class="auth-btn">Войти</a>
                <a href="/register/" class="auth-btn register-btn">Регистрация</a>
            {% endif %}
            <img src="{% static 'img/dpb-logo.png' %}" alt="Логотип">
            <div class="header-links"></div>
                    <a href="/article/new/" class="new-post-btn">+ Новая статья</a>
            </div>
        </div>
        <div class="archive">
            {% for post in posts %}
            <div class="one-post">
                <div class="post-managment">
                    <h2 class="post-title">
                        <a href="/article/{{ post.id }}">{{ post.title }}</a>
                    </h2>
                    <p class="fold-button">Свернуть</p>
                </div>
                <div class="article-info">
                    <div class="article-author">{{ post.author.username }}</div>
                    <div class="article-created-date">{{ post.created_date }}</div>
                </div>
                <p class="article-text">{{ post.get_excerpt }}</p>
                <div class="one-post-shadow"></div>
            </div>
            {% endfor %}
        </div>
        {% load static %}
        <script src="{{ STATIC_URL }}js/jquery.js"></script>
        <script src="{% static 'js/helloworld.js' %}"></script>
        <script src="{% static 'js/fold-post.js' %}"></script>
        <script src="{% static 'js/highlight-post.js' %}"></script>
    </body>
</html>
