<!DOCTYPE html>
<html>
<head>
    <title>Регистрация</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/article.css' %}">
</head>
    <body class="register">
        <div class="header">
            <img src="{% static 'img/dpb-logo.png' %}" alt="Логотип" />
        </div>
        
        <div class="content">
            <h1>Регистрация</h1>
            
            <form method="POST" class="auth-form">
                {% csrf_token %}
                
                <div class="form-group">
                    <label for="username">Имя пользователя:</label>
                    <input type="text" name="username" id="username" 
                        placeholder="Введите имя пользователя" 
                        value="{{ username }}" class="form-control" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" name="email" id="email" 
                        placeholder="Введите email" 
                        value="{{ email }}" class="form-control" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Пароль:</label>
                    <input type="password" name="password" id="password" 
                        placeholder="Введите пароль" class="form-control" required>
                </div>
                
                <div class="form-group">
                    <label for="password2">Подтверждение пароля:</label>
                    <input type="password" name="password2" id="password2" 
                        placeholder="Повторите пароль" class="form-control" required>
                </div>
                
                <div class="form-actions">
                    <button type="submit" class="submit-btn">Зарегистрироваться</button>
                    <a href="/" class="cancel-btn">Отмена</a>
                </div>
                
                <div class="auth-links">
                    Уже есть аккаунт? <a href="/login/">Войдите</a>
                </div>
                
                {% if errors %}
                    <div class="errors">
                        {{ errors }}
                    </div>
                {% endif %}
            </form>
        </div>
    </body>
</html>
