<!DOCTYPE html>
<html>
<head>
    <title>Django Public Blog - создать статью</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/article.css' %}">
</head>
    <body class="create-post">
        <div class="header">
            <img src="{% static 'img/dpb-logo.png' %}" alt="Логотип" />
        </div>
        
        <div class="content">
            <h1>Написать статью</h1>
            
            <form method="POST" class="post-form">
                {% csrf_token %}
                
                <div class="form-group">
                    <label for="title">Название статьи:</label>
                    <input type="text" name="title" id="title" 
                        placeholder="Введите название статьи" 
                        value="{{ form.title }}" class="form-control">
                </div>
                
                <div class="form-group">
                    <label for="text">Текст статьи:</label>
                    <textarea name="text" id="text" 
                            placeholder="Введите текст статьи" 
                            rows="10" class="form-control">{{ form.text }}</textarea>
                </div>
                
                <div class="form-actions">
                    <input type="submit" value="Сохранить" class="submit-btn">
                    <a href="/" class="cancel-btn">Отмена</a>
                </div>
                
                {% if form.errors %}
                    <div class="errors">
                        {{ form.errors }}
                    </div>
                {% endif %}
            </form>
        </div>
    </body>
</html>
